<html>
    <head>
        <title>test</title>
        <script>
            var stepNumber = 11
            var moveTimer = null

            function step()
            {
                stepNumber = stepNumber + 1
                if(stepNumber >= 30)
                {
                    stepNumber = 0
                }
                alien.src = "images/alien/alienrwalk" + stepNumber + ".gif"
            }

            function moveRight()
            {
                alien.style.left = parseInt(alien.style.left) + 1 + "px"
                step()
            }


            function jumpUp()
            {
                  //alien.style.top = parseInt(alien.style.top) - 1 + "px";
            alien.style.transform = 'translateY(-100px)';
            alien.style.transition = '0.5s ease-out';

            setTimeout(function jumpDown(){
                alien.style.transform = 'translateY(0px)';
            }, 1000);
        }
            

            function jumpDown()
            {
                alien.style.top = parseInt(alien.style.top) + 1 + "px"
            }

            function moveLeft()
        {
            alien.style.left = parseInt(alien.style.left) - 1 + "px"
            stepLeft();

            if(alien.getBoundingClientRect().left == 0){
                clearInterval(moveTimer);
                moveTimer = setInterval(moveRight, 20);
            }

            let box = document.querySelector("#box");
            if(box.getBoundingClientRect().right == alien.getBoundingClientRect().left){
                if(box.style.height > alien.style.height){
                    clearInterval(moveTimer);
                    moveTimer = setInterval(moveRight, 20);
                } else{
                    box.style.left = parseInt(box.style.left) - 1 + "px";
                }
            }
        }            
            
            

            function toggleMoving()
            {
                alien = document.getElementById("a")

                alien.onclick=function(myEvent)
                {
                
                }

                window.onkeydown=handleKeyPress
            }

            function handleKeyPress(myEvent)
            {

                if(myEvent.which == 39) // right-arrow key
                {
                    if(moveTimer == null)
                    {
                        moveTimer = setInterval(moveRight, 20)
                    }
                    else    
                    {
                        clearInterval(moveTimer)
                        moveTimer = null
                    }
                }
                else if(myEvent.which == 37) // left-arrow key
                {
                    if(moveTimer == null)
                    {
                        moveTimer = setInterval(moveLeft, 20)
                    }
                    else    
                    {
                        clearInterval(moveTimer)
                        moveTimer = null
                    }                    
                }
                else if(myEvent.which == 38) // up-arrow key
                {
                    if(moveTimer == null)
                    {
                        moveTimer = setInterval(jumpUp, 20)
                        
                        
                    }
                    else    
                    {
                        clearInterval(moveTimer)
                        moveTimer = null
                    }                    
                }
                else if(myEvent.which == 40)
                {
                    // press down to stop moving
                    if(moveTimer != null)
                    {
     
                        clearInterval(moveTimer)
                        moveTimer = null
                    }
                }
            }

            onload=toggleMoving
        </script>
    </head>
    <body>
        <img src="images/alien/alienrwalk11.gif" id="a" style="position:absolute;left:8px; top:300px">
        <img id="box" src="little_box.gif" style="position:abosilute; left:320px; top:20px">
        <img id="box" src="big_box.gif" style="position:abosilute; left:320px; top:20px">
    </body>
    
</html>
