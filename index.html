<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 02</title>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

    <script>
        var stepNumber = 11
        var moveTimer = null

        function stepRight()
        {
            stepNumber = stepNumber + 1
            if(stepNumber >= 30)
            {
                stepNumber = 0
            }
            alien.src = "images/alien/alienrwalk" + stepNumber + ".gif"
        }

        function stepLeft()
        {
            stepNumber++       
            if(stepNumber > 30)
            {
                stepNumber = 0   
            }

            alien.src = "images/alien/alienlwalk" + stepNumber + ".gif"
        }

        function moveRight()
        {
            alien.style.left = parseInt(alien.style.left) + 1 + "px"
            stepRight();

            if(alien.getBoundingClientRect().right == window.innerWidth){
                clearInterval(moveTimer);
                moveTimer = setInterval(moveLeft, 20);
            }

            let box = document.querySelector("#box");
            if(box.getBoundingClientRect().left == alien.getBoundingClientRect().right){
                if(box.style.height > alien.style.height){
                    clearInterval(moveTimer);
                    moveTimer = setInterval(moveLeft, 20);
                } else{
                    box.style.left = parseInt(box.style.left) + 1 + "px";
                }
            }
        }

        function jumpUp()
        {
            //alien.style.top = parseInt(alien.style.top) - 1 + "px";
            alien.style.transform = 'translateY(-100px)';
            alien.style.transition = '0.5s ease-out';

            setTimeout(function jumpDown(){
                alien.style.transform = 'translateY(0px)';
            }, 1000);

            // clearTimeout(moveTimer);
            // moveTimer = null;

            if(alien.getBoundingClientRect().bottom == box.getBoundingClientRect().top){
                box.src = "images/explodes.gif";
            }
        }

        function moveLeft()
        {
            alien.style.left = parseInt(alien.style.left) - 1 + "px"
            stepLeft();

            if(alien.getBoundingClientRect().left == 0){
                clearInterval(moveTimer);
                moveTimer = setInterval(moveRight, 20);
            }

            let box = document.querySelector("#box");
            if(box.getBoundingClientRect().right == alien.getBoundingClientRect().left){
                if(box.style.height > alien.style.height){
                    clearInterval(moveTimer);
                    moveTimer = setInterval(moveRight, 20);
                } else{
                    box.style.left = parseInt(box.style.left) - 1 + "px";
                }
            }
        }            

        function toggleMoving()
        {
            alien = document.getElementById("a")

            alien.onclick=function(myEvent)
            {
            
            }

            window.onkeydown=handleKeyPress;
        }

        function handleKeyPress(myEvent)
        {

            if(myEvent.which == 39) // right-arrow key
            {
                if(moveTimer == null)
                {
                    moveTimer = setInterval(moveRight, 20);
                }
                else    
                {
                    clearInterval(moveTimer);
                    moveTimer = null;
                    moveTimer = setInterval(moveRight, 20);
                }
            }
            else if(myEvent.which == 37) // left-arrow key
            {
                if(moveTimer == null)
                {
                    moveTimer = setInterval(moveLeft, 20);
                }
                else    
                {
                    clearInterval(moveTimer);
                    moveTimer = null;
                    moveTimer = setInterval(moveLeft, 20);
                }                    
            }
            else if(myEvent.which == 38) // up-arrow key
            {
                if(moveTimer == null)
                {
                    moveTimer = setTimeout(jumpUp, 1)
                }
                else   
                {
                    clearInterval(moveTimer);
                    moveTimer = null;
                } 
            }
            else if(myEvent.which == 40)
            {
                // press down to stop moving
                if(moveTimer != null)
                {
                    clearInterval(moveTimer);
                    moveTimer = null;
                }
            }
        }

        onload=toggleMoving
    </script>

</head>
<body>
    <img src="images/alien/alienrwalk11.gif" id="a" alt="alien" style="position:absolute;left:200px;top:200px">
    <p><span style="font-size: 20pt;">Note: </span>After jumping, the alien no longer detects collision... not sure why, but before commiting the alien to jump, everything works as intended.</p>
</body>
</html>
