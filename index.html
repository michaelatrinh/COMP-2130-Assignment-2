<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Assignment 02</title>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

    <script>

        window.onload = function startAnim(){
            var stepNumber = 11;
            var moveTimer = null;
            var alien = document.querySelector("#alien");

            document.addEventListener("keypress", handleKeyPress);

            function handleKeyPress(key){
                if(key.which == 37){ // left arrow
                    if(moveTimer == null){
                        moveTimer = setInterval(moveLeft, 20);
                    } else{
                        clearInterval(moveTimer);
                        moveTimer = setInterval(moveLeft, 20);
                    }
                } else if(key.which == 39){ // right arrow
                    if(moveTimer == null){
                        moveTimer = setInterval(moveRight, 20);
                    } else{
                        clearInterval(moveTimer);
                        moveTimer = setInterval(moveRight, 20);
                    }
                } else if(key.which == 38){ // up arrow
                    jump();
                }
            }
            
            function jump(){
                alien.style.transform += 'translateY(-100px)'
                alien.style.transition = '0.5s ease-out'

                setTimeout(function jumpDown(){
                    alien.style.transform -= 'translateY(100px)';
                }, 1000)
            }

            function moveRight(){
                alien.style.left = parseInt(alien.style.left) + 1 + "px";

                stepRight();
            }

            function stepRight(){
                stepNumber++;
                if(stepNumber > 30){
                    stepNumber = 0;
                }

                alien.src = "images/alien/alienrwalk" + stepNumber + ".gif";
            }

            function moveLeft(){
                alien.style.right = parseInt(alien.style.right) + 1 + "px";
            
                stepLeft();
            }        
            
            function stepLeft(){
                stepNumber++;
                if(stepNumber > 30)
                {
                    stepNumber = 0 ;
                }

                alien.src = "images/alien/alienlwalk" + stepNumber + ".gif"
            }
        }
